<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Warm the Shopify product-image CDN connection early -->
    <link rel="preconnect" href="https://cdn.shopify.com" crossorigin />
    <link rel="dns-prefetch" href="https://cdn.shopify.com" />
    <link rel="preconnect" href="https://internet-soccer-club.myshopify.com" crossorigin />
    <link rel="dns-prefetch" href="https://internet-soccer-club.myshopify.com" />

    <title>internet fc · World Cup 2026</title>
    <meta name="description" content="48 nations, every crest fit to the same 32×32 pixel grid. The 2026 World Cup as a constrained system you can browse, predict, and own." />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <link rel="canonical" href="https://www.internetfc.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="internet fc" />
    <meta property="og:title" content="internet fc · World Cup 2026" />
    <meta property="og:description" content="48 nations, one 32×32 pixel grid. Browse, predict, and own the 2026 World Cup." />
    <meta property="og:url" content="https://www.internetfc.com/" />
    <meta property="og:image" content="https://www.internetfc.com/og.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="internet fc · 48 nations on one 32×32 pixel grid" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="internet fc · World Cup 2026" />
    <meta name="twitter:description" content="48 nations, one 32×32 pixel grid. Browse, predict, and own the 2026 World Cup." />
    <meta name="twitter:image" content="https://www.internetfc.com/og.png" />

    <script>
      // apply saved theme before paint to avoid a flash
      try {
        var t = localStorage.getItem('ifc-theme');
        if (!t && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) t = 'dark';
        if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
