<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- iFC 3D cube mark: animated GIF where supported, PNG fallback elsewhere -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=5" />
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon-512.png?v=5" />
    <link rel="icon" type="image/gif" href="/favicon.gif?v=5" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=5" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Fonts: discovered in parallel with the page (was a CSS @import, which
         serialized: css bundle → fonts css → font files). Weight 300 dropped
         (unused). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- headline bitmap face — preloaded so titles don't flash the fallback -->
    <link rel="preload" as="font" type="font/woff2" href="/fonts/PPNeueBit-Bold.woff2" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Sora:wght@400;500;600;700;800&display=swap"
    />

    <!-- Warm the Shopify product-image CDN connection early -->
    <link rel="preconnect" href="https://cdn.shopify.com" crossorigin />
    <link rel="dns-prefetch" href="https://cdn.shopify.com" />
    <link rel="preconnect" href="https://internet-soccer-club.myshopify.com" crossorigin />
    <link rel="dns-prefetch" href="https://internet-soccer-club.myshopify.com" />

    <title>internet fc · World Cup 2026</title>
    <meta name="description" content="48 nations, every crest fit to the same 32×32 pixel grid. The 2026 World Cup as a constrained system you can browse, predict, and own." />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <link rel="canonical" href="https://www.internetfc.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="internet fc" />
    <meta property="og:title" content="internet fc · World Cup 2026" />
    <meta property="og:description" content="48 nations, one 32×32 pixel grid. Browse, predict, and own the 2026 World Cup." />
    <meta property="og:url" content="https://www.internetfc.com/" />
    <meta property="og:image" content="https://www.internetfc.com/og.png?v=3" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="internet fc · 48 nations on one 32×32 pixel grid" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="internet fc · World Cup 2026" />
    <meta name="twitter:description" content="48 nations, one 32×32 pixel grid. Browse, predict, and own the 2026 World Cup." />
    <meta name="twitter:image" content="https://www.internetfc.com/og.png?v=3" />

    <script>
      // apply saved theme before paint to avoid a flash
      try {
        var t = localStorage.getItem('ifc-theme');
        if (!t) t = 'dark'; // dark is the default
        if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
