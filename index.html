<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vector Grid // 32×32</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'JetBrains Mono', monospace; cursor: crosshair; }
        #fluid-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
        #canvas-container { width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; z-index: 1; }
        .top-right-controls { position: fixed; top: 24px; right: 24px; z-index: 100; display: flex; align-items: center; gap: 10px; }
        .top-left-controls { position: fixed; top: 24px; left: 24px; z-index: 100; }
        .top-left-controls button { background: rgba(0,0,0,0.7); border: 1px solid #333; color: #666; padding: 8px 16px; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.3s ease; }
        .top-left-controls button:hover { border-color: #fff; color: #fff; background: rgba(255,255,255,0.1); }
        .icon-btn { background: rgba(0,0,0,0.7); border: 1px solid #333; color: #666; width: 36px; height: 36px; font-size: 18px; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; }
        .icon-btn:hover { border-color: #fff; color: #fff; background: rgba(255,255,255,0.1); }
        .toggle-switch { position: relative; width: 44px; height: 24px; background: #333; border-radius: 12px; cursor: pointer; transition: background 0.3s; }
        .toggle-switch.active { background: #fff; }
        .toggle-switch::after { content: ''; position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; background: #888; border-radius: 50%; transition: transform 0.3s, background 0.3s; }
        .toggle-switch.active::after { transform: translateX(20px); background: #333; }
        .toggle-label { color: #666; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; }
        .side-slider { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; align-items: center; gap: 15px; }
        .side-slider input[type="range"] { width: 150px; height: 8px; -webkit-appearance: none; appearance: none; background: #333; border-radius: 4px; outline: none; cursor: pointer; }
        .side-slider input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 20px; height: 20px; background: #888; border-radius: 50%; cursor: pointer; transition: background 0.2s; }
        .side-slider input[type="range"]::-webkit-slider-thumb:hover { background: #fff; }
        .side-slider input[type="range"]::-moz-range-thumb { width: 20px; height: 20px; background: #888; border-radius: 50%; cursor: pointer; border: none; }
        .side-slider .slider-label { color: #666; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; }
        .controls { position: fixed; bottom: 24px; left: 24px; display: flex; gap: 12px; z-index: 100; flex-wrap: wrap; }
        .controls button { background: rgba(0,0,0,0.7); border: 1px solid #333; color: #666; padding: 8px 16px; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.3s ease; }
        .controls button:hover { border-color: #fff; color: #fff; background: rgba(255,255,255,0.1); }
        .loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #fff; font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; z-index: 1000; animation: pulse 1s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>
    <canvas id="fluid-canvas"></canvas>
    <div class="loading" id="loading">Initializing Grid...</div>

    <div class="top-left-controls">
        <button id="teams-btn-top">Teams</button>
    </div>
    <div class="top-right-controls">
        <button id="refresh-btn" class="icon-btn">↻</button>
        <span class="toggle-label">Dark</span>
        <div class="toggle-switch" id="mode-toggle"></div>
        <span class="toggle-label">Light</span>
    </div>
    <div class="side-slider">
        <span class="slider-label">−</span>
        <input type="range" id="scale-slider" min="0.3" max="1.5" step="0.01" value="1">
        <span class="slider-label">+</span>
        <span class="slider-label" style="margin-left: 20px;">↺</span>
        <input type="range" id="rotate-slider" min="0" max="360" step="1" value="0">
        <span class="slider-label">↻</span>
    </div>
    <div class="controls">
        <button id="shape-btn">Spheres</button>
        <button id="wave-btn">VFX</button>
    </div>
    <div id="canvas-container"></div>

    <script>
    'use strict';

    // ============== FLUID SIMULATION ==============
    const fluidCanvas = document.getElementById('fluid-canvas');
    fluidCanvas.width = fluidCanvas.clientWidth;
    fluidCanvas.height = fluidCanvas.clientHeight;

    let fluidConfig = { TEXTURE_DOWNSAMPLE: 1, DENSITY_DISSIPATION: 0.98, VELOCITY_DISSIPATION: 0.98, PRESSURE_DISSIPATION: 0.8, PRESSURE_ITERATIONS: 25, CURL: 30, SPLAT_RADIUS: 0.005 };
    let fluidPointers = [];

    const { gl: fluidGl, ext: fluidExt } = getFluidWebGLContext(fluidCanvas);

    function getFluidWebGLContext(canvas) {
        const params = { alpha: false, depth: false, stencil: false, antialias: false };
        let gl = canvas.getContext('webgl2', params);
        const isWebGL2 = !!gl;
        if (!isWebGL2) gl = canvas.getContext('webgl', params) || canvas.getContext('experimental-webgl', params);
        let halfFloat, supportLinearFiltering;
        if (isWebGL2) { gl.getExtension('EXT_color_buffer_float'); supportLinearFiltering = gl.getExtension('OES_texture_float_linear'); }
        else { halfFloat = gl.getExtension('OES_texture_half_float'); supportLinearFiltering = gl.getExtension('OES_texture_half_float_linear'); }
        gl.clearColor(0.0, 0.0, 0.0, 1.0);
        const halfFloatTexType = isWebGL2 ? gl.HALF_FLOAT : halfFloat.HALF_FLOAT_OES;
        let formatRGBA, formatRG, formatR;
        if (isWebGL2) { formatRGBA = getFluidSupportedFormat(gl, gl.RGBA16F, gl.RGBA, halfFloatTexType); formatRG = getFluidSupportedFormat(gl, gl.RG16F, gl.RG, halfFloatTexType); formatR = getFluidSupportedFormat(gl, gl.R16F, gl.RED, halfFloatTexType); }
        else { formatRGBA = formatRG = formatR = getFluidSupportedFormat(gl, gl.RGBA, gl.RGBA, halfFloatTexType); }
        return { gl, ext: { formatRGBA, formatRG, formatR, halfFloatTexType, supportLinearFiltering } };
    }

    function getFluidSupportedFormat(gl, internalFormat, format, type) {
        if (!supportFluidRenderTextureFormat(gl, internalFormat, format, type)) {
            if (internalFormat === gl.R16F) return getFluidSupportedFormat(gl, gl.RG16F, gl.RG, type);
            if (internalFormat === gl.RG16F) return getFluidSupportedFormat(gl, gl.RGBA16F, gl.RGBA, type);
            return null;
        }
        return { internalFormat, format };
    }

    function supportFluidRenderTextureFormat(gl, internalFormat, format, type) {
        let texture = gl.createTexture();
        gl.bindTexture(gl.TEXTURE_2D, texture);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.NEAREST);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.NEAREST);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
        gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
        gl.texImage2D(gl.TEXTURE_2D, 0, internalFormat, 4, 4, 0, format, type, null);
        let fbo = gl.createFramebuffer();
        gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
        gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, texture, 0);
        return gl.checkFramebufferStatus(gl.FRAMEBUFFER) === gl.FRAMEBUFFER_COMPLETE;
    }

    function fluidPointerPrototype() { this.id = -1; this.x = 0; this.y = 0; this.dx = 0; this.dy = 0; this.down = false; this.moved = false; this.color = [30, 0, 300]; }
    fluidPointers.push(new fluidPointerPrototype());

    class FluidGLProgram {
        constructor(vs, fs) {
            this.uniforms = {};
            this.program = fluidGl.createProgram();
            fluidGl.attachShader(this.program, vs);
            fluidGl.attachShader(this.program, fs);
            fluidGl.linkProgram(this.program);
            const uc = fluidGl.getProgramParameter(this.program, fluidGl.ACTIVE_UNIFORMS);
            for (let i = 0; i < uc; i++) { const n = fluidGl.getActiveUniform(this.program, i).name; this.uniforms[n] = fluidGl.getUniformLocation(this.program, n); }
        }
        bind() { fluidGl.useProgram(this.program); }
    }

    function compileFluidShader(type, source) {
        const shader = fluidGl.createShader(type);
        fluidGl.shaderSource(shader, source);
        fluidGl.compileShader(shader);
        return shader;
    }

    const fluidBaseVS = compileFluidShader(fluidGl.VERTEX_SHADER, `precision highp float; attribute vec2 aPosition; varying vec2 vUv, vL, vR, vT, vB; uniform vec2 texelSize; void main() { vUv = aPosition * 0.5 + 0.5; vL = vUv - vec2(texelSize.x, 0.0); vR = vUv + vec2(texelSize.x, 0.0); vT = vUv + vec2(0.0, texelSize.y); vB = vUv - vec2(0.0, texelSize.y); gl_Position = vec4(aPosition, 0.0, 1.0); }`);
    const fluidClearFS = compileFluidShader(fluidGl.FRAGMENT_SHADER, `precision highp float; varying vec2 vUv; uniform sampler2D uTexture; uniform float value; void main() { gl_FragColor = value * texture2D(uTexture, vUv); }`);
    const fluidDisplayFS = compileFluidShader(fluidGl.FRAGMENT_SHADER, `precision highp float; varying vec2 vUv; uniform sampler2D uTexture; void main() { vec3 c = texture2D(uTexture, vUv).rgb; float lum = dot(c, vec3(0.299, 0.587, 0.114)); vec3 darkChrome = vec3(0.15, 0.17, 0.2); vec3 midChrome = vec3(0.5, 0.53, 0.58); vec3 brightChrome = vec3(0.85, 0.88, 0.92); vec3 highlight = vec3(1.0, 1.0, 1.0); float angle = lum * 10.0 + vUv.x * 4.0 + vUv.y * 3.0; float irid = sin(angle) * 0.03; vec3 color = mix(darkChrome, midChrome, smoothstep(0.0, 0.4, lum)); color = mix(color, brightChrome, smoothstep(0.3, 0.7, lum)); color = mix(color, highlight, smoothstep(0.75, 1.0, lum) * 0.5); color += vec3(irid, irid * 0.5, -irid); color *= lum * 1.4 + 0.1; gl_FragColor = vec4(color, 1.0); }`);
    const fluidSplatFS = compileFluidShader(fluidGl.FRAGMENT_SHADER, `precision highp float; varying vec2 vUv; uniform sampler2D uTarget; uniform float aspectRatio; uniform vec3 color; uniform vec2 point; uniform float radius; void main() { vec2 p = vUv - point.xy; p.x *= aspectRatio; vec3 splat = exp(-dot(p, p) / radius) * color; vec3 base = texture2D(uTarget, vUv).xyz; gl_FragColor = vec4(base + splat, 1.0); }`);
    const fluidAdvectionFS = compileFluidShader(fluidGl.FRAGMENT_SHADER, `precision highp float; varying vec2 vUv; uniform sampler2D uVelocity, uSource; uniform vec2 texelSize; uniform float dt, dissipation; void main() { vec2 coord = vUv - dt * texture2D(uVelocity, vUv).xy * texelSize; gl_FragColor = dissipation * texture2D(uSource, coord); gl_FragColor.a = 1.0; }`);
    const fluidDivergenceFS = compileFluidShader(fluidGl.FRAGMENT_SHADER, `precision highp float; varying vec2 vUv, vL, vR, vT, vB; uniform sampler2D uVelocity; vec2 sampleV(vec2 uv) { vec2 m = vec2(1.0); if(uv.x<0.0){uv.x=0.0;m.x=-1.0;} if(uv.x>1.0){uv.x=1.0;m.x=-1.0;} if(uv.y<0.0){uv.y=0.0;m.y=-1.0;} if(uv.y>1.0){uv.y=1.0;m.y=-1.0;} return m*texture2D(uVelocity,uv).xy; } void main() { float L=sampleV(vL).x, R=sampleV(vR).x, T=sampleV(vT).y, B=sampleV(vB).y; gl_FragColor = vec4(0.5*(R-L+T-B), 0.0, 0.0, 1.0); }`);
    const fluidCurlFS = compileFluidShader(fluidGl.FRAGMENT_SHADER, `precision highp float; varying vec2 vUv, vL, vR, vT, vB; uniform sampler2D uVelocity; void main() { float L=texture2D(uVelocity,vL).y, R=texture2D(uVelocity,vR).y, T=texture2D(uVelocity,vT).x, B=texture2D(uVelocity,vB).x; gl_FragColor = vec4(R-L-T+B, 0.0, 0.0, 1.0); }`);
    const fluidVorticityFS = compileFluidShader(fluidGl.FRAGMENT_SHADER, `precision highp float; varying vec2 vUv, vT, vB; uniform sampler2D uVelocity, uCurl; uniform float curl, dt; void main() { float T=texture2D(uCurl,vT).x, B=texture2D(uCurl,vB).x, C=texture2D(uCurl,vUv).x; vec2 force=vec2(abs(T)-abs(B),0.0); force*=1.0/length(force+0.00001)*curl*C; vec2 vel=texture2D(uVelocity,vUv).xy; gl_FragColor=vec4(vel+force*dt,0.0,1.0); }`);
    const fluidPressureFS = compileFluidShader(fluidGl.FRAGMENT_SHADER, `precision highp float; varying vec2 vUv, vL, vR, vT, vB; uniform sampler2D uPressure, uDivergence; vec2 b(vec2 uv){return min(max(uv,0.0),1.0);} void main() { float L=texture2D(uPressure,b(vL)).x, R=texture2D(uPressure,b(vR)).x, T=texture2D(uPressure,b(vT)).x, B=texture2D(uPressure,b(vB)).x, div=texture2D(uDivergence,vUv).x; gl_FragColor=vec4((L+R+B+T-div)*0.25,0.0,0.0,1.0); }`);
    const fluidGradSubFS = compileFluidShader(fluidGl.FRAGMENT_SHADER, `precision highp float; varying vec2 vUv, vL, vR, vT, vB; uniform sampler2D uPressure, uVelocity; vec2 b(vec2 uv){return min(max(uv,0.0),1.0);} void main() { float L=texture2D(uPressure,b(vL)).x, R=texture2D(uPressure,b(vR)).x, T=texture2D(uPressure,b(vT)).x, B=texture2D(uPressure,b(vB)).x; vec2 vel=texture2D(uVelocity,vUv).xy; vel.xy-=vec2(R-L,T-B); gl_FragColor=vec4(vel,0.0,1.0); }`);

    let fluidTextureWidth, fluidTextureHeight, fluidDensity, fluidVelocity, fluidDivergence, fluidCurl, fluidPressure;
    initFluidFramebuffers();

    const fluidClearProg = new FluidGLProgram(fluidBaseVS, fluidClearFS);
    const fluidDisplayProg = new FluidGLProgram(fluidBaseVS, fluidDisplayFS);
    const fluidSplatProg = new FluidGLProgram(fluidBaseVS, fluidSplatFS);
    const fluidAdvectionProg = new FluidGLProgram(fluidBaseVS, fluidAdvectionFS);
    const fluidDivergenceProg = new FluidGLProgram(fluidBaseVS, fluidDivergenceFS);
    const fluidCurlProg = new FluidGLProgram(fluidBaseVS, fluidCurlFS);
    const fluidVorticityProg = new FluidGLProgram(fluidBaseVS, fluidVorticityFS);
    const fluidPressureProg = new FluidGLProgram(fluidBaseVS, fluidPressureFS);
    const fluidGradSubProg = new FluidGLProgram(fluidBaseVS, fluidGradSubFS);

    function initFluidFramebuffers() {
        fluidTextureWidth = fluidGl.drawingBufferWidth >> fluidConfig.TEXTURE_DOWNSAMPLE;
        fluidTextureHeight = fluidGl.drawingBufferHeight >> fluidConfig.TEXTURE_DOWNSAMPLE;
        const texType = fluidExt.halfFloatTexType, rgba = fluidExt.formatRGBA, rg = fluidExt.formatRG, r = fluidExt.formatR;
        const filtering = fluidExt.supportLinearFiltering ? fluidGl.LINEAR : fluidGl.NEAREST;
        fluidDensity = createFluidDoubleFBO(2, fluidTextureWidth, fluidTextureHeight, rgba.internalFormat, rgba.format, texType, filtering);
        fluidVelocity = createFluidDoubleFBO(0, fluidTextureWidth, fluidTextureHeight, rg.internalFormat, rg.format, texType, filtering);
        fluidDivergence = createFluidFBO(4, fluidTextureWidth, fluidTextureHeight, r.internalFormat, r.format, texType, fluidGl.NEAREST);
        fluidCurl = createFluidFBO(5, fluidTextureWidth, fluidTextureHeight, r.internalFormat, r.format, texType, fluidGl.NEAREST);
        fluidPressure = createFluidDoubleFBO(6, fluidTextureWidth, fluidTextureHeight, r.internalFormat, r.format, texType, fluidGl.NEAREST);
    }

    function createFluidFBO(texId, w, h, internalFormat, format, type, param) {
        fluidGl.activeTexture(fluidGl.TEXTURE0 + texId);
        let texture = fluidGl.createTexture();
        fluidGl.bindTexture(fluidGl.TEXTURE_2D, texture);
        fluidGl.texParameteri(fluidGl.TEXTURE_2D, fluidGl.TEXTURE_MIN_FILTER, param);
        fluidGl.texParameteri(fluidGl.TEXTURE_2D, fluidGl.TEXTURE_MAG_FILTER, param);
        fluidGl.texParameteri(fluidGl.TEXTURE_2D, fluidGl.TEXTURE_WRAP_S, fluidGl.CLAMP_TO_EDGE);
        fluidGl.texParameteri(fluidGl.TEXTURE_2D, fluidGl.TEXTURE_WRAP_T, fluidGl.CLAMP_TO_EDGE);
        fluidGl.texImage2D(fluidGl.TEXTURE_2D, 0, internalFormat, w, h, 0, format, type, null);
        let fbo = fluidGl.createFramebuffer();
        fluidGl.bindFramebuffer(fluidGl.FRAMEBUFFER, fbo);
        fluidGl.framebufferTexture2D(fluidGl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, fluidGl.TEXTURE_2D, texture, 0);
        fluidGl.viewport(0, 0, w, h);
        fluidGl.clear(fluidGl.COLOR_BUFFER_BIT);
        return [texture, fbo, texId];
    }

    function createFluidDoubleFBO(texId, w, h, internalFormat, format, type, param) {
        let fbo1 = createFluidFBO(texId, w, h, internalFormat, format, type, param);
        let fbo2 = createFluidFBO(texId + 1, w, h, internalFormat, format, type, param);
        return { get read() { return fbo1; }, get write() { return fbo2; }, swap() { [fbo1, fbo2] = [fbo2, fbo1]; } };
    }

    const fluidBlit = (() => {
        fluidGl.bindBuffer(fluidGl.ARRAY_BUFFER, fluidGl.createBuffer());
        fluidGl.bufferData(fluidGl.ARRAY_BUFFER, new Float32Array([-1,-1,-1,1,1,1,1,-1]), fluidGl.STATIC_DRAW);
        fluidGl.bindBuffer(fluidGl.ELEMENT_ARRAY_BUFFER, fluidGl.createBuffer());
        fluidGl.bufferData(fluidGl.ELEMENT_ARRAY_BUFFER, new Uint16Array([0,1,2,0,2,3]), fluidGl.STATIC_DRAW);
        fluidGl.vertexAttribPointer(0, 2, fluidGl.FLOAT, false, 0, 0);
        fluidGl.enableVertexAttribArray(0);
        return (dest) => { fluidGl.bindFramebuffer(fluidGl.FRAMEBUFFER, dest); fluidGl.drawElements(fluidGl.TRIANGLES, 6, fluidGl.UNSIGNED_SHORT, 0); };
    })();

    let fluidLastTime = Date.now();
    // Only create splats on user interaction, no auto-splats

    function fluidStep() {
        fluidResizeCanvas();
        const dt = Math.min((Date.now() - fluidLastTime) / 1000, 0.016);
        fluidLastTime = Date.now();
        fluidGl.viewport(0, 0, fluidTextureWidth, fluidTextureHeight);

        fluidAdvectionProg.bind();
        fluidGl.uniform2f(fluidAdvectionProg.uniforms.texelSize, 1.0/fluidTextureWidth, 1.0/fluidTextureHeight);
        fluidGl.uniform1i(fluidAdvectionProg.uniforms.uVelocity, fluidVelocity.read[2]);
        fluidGl.uniform1i(fluidAdvectionProg.uniforms.uSource, fluidVelocity.read[2]);
        fluidGl.uniform1f(fluidAdvectionProg.uniforms.dt, dt);
        fluidGl.uniform1f(fluidAdvectionProg.uniforms.dissipation, fluidConfig.VELOCITY_DISSIPATION);
        fluidBlit(fluidVelocity.write[1]); fluidVelocity.swap();

        fluidGl.uniform1i(fluidAdvectionProg.uniforms.uVelocity, fluidVelocity.read[2]);
        fluidGl.uniform1i(fluidAdvectionProg.uniforms.uSource, fluidDensity.read[2]);
        fluidGl.uniform1f(fluidAdvectionProg.uniforms.dissipation, fluidConfig.DENSITY_DISSIPATION);
        fluidBlit(fluidDensity.write[1]); fluidDensity.swap();

        for (let p of fluidPointers) { if (p.moved) { fluidSplat(p.x, p.y, p.dx, p.dy, p.color); p.moved = false; } }

        fluidCurlProg.bind();
        fluidGl.uniform2f(fluidCurlProg.uniforms.texelSize, 1.0/fluidTextureWidth, 1.0/fluidTextureHeight);
        fluidGl.uniform1i(fluidCurlProg.uniforms.uVelocity, fluidVelocity.read[2]);
        fluidBlit(fluidCurl[1]);

        fluidVorticityProg.bind();
        fluidGl.uniform2f(fluidVorticityProg.uniforms.texelSize, 1.0/fluidTextureWidth, 1.0/fluidTextureHeight);
        fluidGl.uniform1i(fluidVorticityProg.uniforms.uVelocity, fluidVelocity.read[2]);
        fluidGl.uniform1i(fluidVorticityProg.uniforms.uCurl, fluidCurl[2]);
        fluidGl.uniform1f(fluidVorticityProg.uniforms.curl, fluidConfig.CURL);
        fluidGl.uniform1f(fluidVorticityProg.uniforms.dt, dt);
        fluidBlit(fluidVelocity.write[1]); fluidVelocity.swap();

        fluidDivergenceProg.bind();
        fluidGl.uniform2f(fluidDivergenceProg.uniforms.texelSize, 1.0/fluidTextureWidth, 1.0/fluidTextureHeight);
        fluidGl.uniform1i(fluidDivergenceProg.uniforms.uVelocity, fluidVelocity.read[2]);
        fluidBlit(fluidDivergence[1]);

        fluidClearProg.bind();
        let pTexId = fluidPressure.read[2];
        fluidGl.activeTexture(fluidGl.TEXTURE0 + pTexId);
        fluidGl.bindTexture(fluidGl.TEXTURE_2D, fluidPressure.read[0]);
        fluidGl.uniform1i(fluidClearProg.uniforms.uTexture, pTexId);
        fluidGl.uniform1f(fluidClearProg.uniforms.value, fluidConfig.PRESSURE_DISSIPATION);
        fluidBlit(fluidPressure.write[1]); fluidPressure.swap();

        fluidPressureProg.bind();
        fluidGl.uniform2f(fluidPressureProg.uniforms.texelSize, 1.0/fluidTextureWidth, 1.0/fluidTextureHeight);
        fluidGl.uniform1i(fluidPressureProg.uniforms.uDivergence, fluidDivergence[2]);
        pTexId = fluidPressure.read[2];
        fluidGl.uniform1i(fluidPressureProg.uniforms.uPressure, pTexId);
        fluidGl.activeTexture(fluidGl.TEXTURE0 + pTexId);
        for (let i = 0; i < fluidConfig.PRESSURE_ITERATIONS; i++) { fluidGl.bindTexture(fluidGl.TEXTURE_2D, fluidPressure.read[0]); fluidBlit(fluidPressure.write[1]); fluidPressure.swap(); }

        fluidGradSubProg.bind();
        fluidGl.uniform2f(fluidGradSubProg.uniforms.texelSize, 1.0/fluidTextureWidth, 1.0/fluidTextureHeight);
        fluidGl.uniform1i(fluidGradSubProg.uniforms.uPressure, fluidPressure.read[2]);
        fluidGl.uniform1i(fluidGradSubProg.uniforms.uVelocity, fluidVelocity.read[2]);
        fluidBlit(fluidVelocity.write[1]); fluidVelocity.swap();

        fluidGl.viewport(0, 0, fluidGl.drawingBufferWidth, fluidGl.drawingBufferHeight);
        fluidDisplayProg.bind();
        fluidGl.uniform1i(fluidDisplayProg.uniforms.uTexture, fluidDensity.read[2]);
        fluidBlit(null);
    }

    function fluidSplat(x, y, dx, dy, color) {
        fluidSplatProg.bind();
        fluidGl.uniform1i(fluidSplatProg.uniforms.uTarget, fluidVelocity.read[2]);
        fluidGl.uniform1f(fluidSplatProg.uniforms.aspectRatio, fluidCanvas.width / fluidCanvas.height);
        fluidGl.uniform2f(fluidSplatProg.uniforms.point, x / fluidCanvas.width, 1.0 - y / fluidCanvas.height);
        fluidGl.uniform3f(fluidSplatProg.uniforms.color, dx, -dy, 1.0);
        fluidGl.uniform1f(fluidSplatProg.uniforms.radius, fluidConfig.SPLAT_RADIUS);
        fluidBlit(fluidVelocity.write[1]); fluidVelocity.swap();
        fluidGl.uniform1i(fluidSplatProg.uniforms.uTarget, fluidDensity.read[2]);
        fluidGl.uniform3f(fluidSplatProg.uniforms.color, color[0]*0.3, color[1]*0.3, color[2]*0.3);
        fluidBlit(fluidDensity.write[1]); fluidDensity.swap();
    }

    function fluidMultipleSplats(amount) {
        for (let i = 0; i < amount; i++) {
            const color = [Math.random()*10, Math.random()*10, Math.random()*10];
            const x = fluidCanvas.width * Math.random(), y = fluidCanvas.height * Math.random();
            const dx = 1000 * (Math.random() - 0.5), dy = 1000 * (Math.random() - 0.5);
            fluidSplat(x, y, dx, dy, color);
        }
    }

    function fluidResizeCanvas() {
        if (fluidCanvas.width !== fluidCanvas.clientWidth || fluidCanvas.height !== fluidCanvas.clientHeight) {
            fluidCanvas.width = fluidCanvas.clientWidth; fluidCanvas.height = fluidCanvas.clientHeight;
            initFluidFramebuffers();
        }
    }

    // Mouse and touch handlers - only splat on actual movement
    let lastMouseX = 0, lastMouseY = 0;
    let colorPhase = 0; // For continuously varying colors

    function getNextColor() {
        colorPhase += 0.15;
        // Varying brightness for nice fluid dynamics
        const base = 0.6 + Math.random() * 0.4;
        return [base, base, base];
    }

    window.addEventListener('mousemove', e => {
        const dx = e.clientX - lastMouseX;
        const dy = e.clientY - lastMouseY;
        lastMouseX = e.clientX;
        lastMouseY = e.clientY;

        if (fluidPointers[0].down && (Math.abs(dx) > 0.5 || Math.abs(dy) > 0.5)) {
            fluidPointers[0].moved = true;
            fluidPointers[0].dx = dx * 10;
            fluidPointers[0].dy = dy * 10;
            fluidPointers[0].x = e.clientX;
            fluidPointers[0].y = e.clientY;
            fluidPointers[0].color = getNextColor(); // Change color on every move
        }
    });

    window.addEventListener('mousedown', e => {
        fluidPointers[0].down = true;
        fluidPointers[0].color = getNextColor();
        lastMouseX = e.clientX;
        lastMouseY = e.clientY;
    });

    window.addEventListener('mouseup', () => {
        fluidPointers[0].down = false;
    });

    // Touch handlers
    window.addEventListener('touchstart', e => {
        const touches = e.targetTouches;
        for (let i = 0; i < touches.length; i++) {
            if (i >= fluidPointers.length) {
                fluidPointers.push(new fluidPointerPrototype());
            }
            fluidPointers[i].down = true;
            fluidPointers[i].x = touches[i].clientX;
            fluidPointers[i].y = touches[i].clientY;
            fluidPointers[i].color = getNextColor();
        }
    }, { passive: true });

    window.addEventListener('touchmove', e => {
        const touches = e.targetTouches;
        for (let i = 0; i < touches.length; i++) {
            if (i >= fluidPointers.length) continue;
            const dx = touches[i].clientX - fluidPointers[i].x;
            const dy = touches[i].clientY - fluidPointers[i].y;
            if (Math.abs(dx) > 0.5 || Math.abs(dy) > 0.5) {
                fluidPointers[i].moved = true;
                fluidPointers[i].dx = dx * 10;
                fluidPointers[i].dy = dy * 10;
                fluidPointers[i].x = touches[i].clientX;
                fluidPointers[i].y = touches[i].clientY;
                fluidPointers[i].color = getNextColor(); // Change color on every move
            }
        }
    }, { passive: true });

    window.addEventListener('touchend', e => {
        const touches = e.changedTouches;
        for (let i = 0; i < touches.length; i++) {
            for (let j = 0; j < fluidPointers.length; j++) {
                if (touches[i].identifier === fluidPointers[j].id) {
                    fluidPointers[j].down = false;
                }
            }
        }
        // Also reset first pointer on any touch end
        if (e.targetTouches.length === 0) {
            fluidPointers[0].down = false;
        }
    }, { passive: true });
    </script>

    function getDelay(pid, type) {

            const idx = pid - 1, row = Math.floor(idx / GRID_SIZE), col = idx % GRID_SIZE;

                setTimeout(() => flipVector(col, row, shouldBeWhite), getDelay(pid, trans));

        const v = vectors[i][j], cur = vectorStates[i][j], next = forceState !== null ? forceState : !cur;
        if (next === cur && forceState === null) return;
        vectorStates[i][j] = next;
        animatingVectors.add(`${i}-${j}`);
