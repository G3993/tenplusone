<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soccer Match Poster</title>
  <style>
    /* Global layout */
    :root {
      --bg: #0c0c0c;
      --panel: #1a1a1a;
      --text: #f5f5f5;
      --accent: #34a6ff;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 24px;
      background: radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.06), transparent 30%),
                  radial-gradient(circle at 80% 10%, rgba(255, 255, 255, 0.04), transparent 28%),
                  var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      min-height: 100vh;
    }

    h1 {
      margin: 0;
      letter-spacing: 0.08em;
      font-size: 20px;
      text-transform: uppercase;
      color: #f0f0f0;
    }

    .layout {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 100%;
      max-width: 1200px;
    }

    .canvas-wrapper {
      position: relative;
      width: min(90vw, calc(90vh * 9 / 16));
      aspect-ratio: 9 / 16;
      background: #111;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 18px 48px rgba(0, 0, 0, 0.55);
      overflow: hidden;
    }

    #three-container {
      width: 100%;
      height: 100%;
    }

    /* Footer text overlay */
    #footerText {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 20%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      text-align: center;
      font-weight: 700;
      letter-spacing: 0.08em;
      mix-blend-mode: screen;
      color: #0c0c0c;
      pointer-events: none;
      text-transform: uppercase;
    }

    .panel {
      width: min(90vw, 720px);
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      padding: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 12px;
    }

    @media (max-width: 860px) {
      .panel {
        grid-template-columns: 1fr;
      }
    }

    textarea {
      width: 100%;
      min-height: 260px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      background: #0f0f10;
      color: #f6f6f6;
      padding: 12px;
      font-family: 'JetBrains Mono', 'SFMono-Regular', Consolas, 'Liberation Mono', monospace;
      resize: vertical;
      line-height: 1.4;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 8px;
      height: 100%;
    }

    button {
      padding: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #0c0c0c;
      background: linear-gradient(135deg, #ff4b3a, #ff7b54);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }

    button.secondary {
      background: linear-gradient(135deg, #34a6ff, #5ec3ff);
      color: #041321;
    }

    button:active {
      transform: translateY(1px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35) inset;
    }

    .hint {
      color: #cccccc;
      font-size: 12px;
      margin-top: 6px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <h1>Optical Soccer Match Poster</h1>
  <div class="layout">
    <div class="canvas-wrapper">
      <div id="three-container"></div>
      <div id="footerText"></div>
    </div>
    <div class="panel">
      <textarea id="jsonInput" aria-label="Match stats JSON"></textarea>
      <div class="buttons">
        <button id="generateBtn">Generate Poster</button>
        <button id="downloadBtn" class="secondary">Download PNG</button>
        <div class="hint">Edit the JSON stats, then click "Generate Poster" to update the artwork.</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>
    // ---------- Utility helpers ----------
    const clamp = (v, min, max) => Math.min(Math.max(v, min), max);
    const norm = (v, min, max) => clamp((v - min) / (max - min), 0, 1);

    const defaultJSON = `{
  "homeTeam": "Cincinnati",
  "awayTeam": "Inter Miami",
  "score": { "home": 0, "away": 4 },

  "shots": { "home": 15, "away": 18 },
  "shotsOnTarget": { "home": 5, "away": 9 },

  "possession": { "home": 49, "away": 51 },
  "passes": { "home": 434, "away": 468 },
  "passAccuracy": { "home": 92, "away": 92 },

  "fouls": { "home": 8, "away": 11 },
  "yellowCards": { "home": 0, "away": 0 },
  "redCards": { "home": 0, "away": 0 },
  "offsides": { "home": 1, "away": 0 },
  "corners": { "home": 4, "away": 2 }
}`;

    // ---------- Three.js setup ----------
    let scene, camera, renderer, material, mesh;
    const containerEl = document.getElementById('three-container');
    const footerText = document.getElementById('footerText');

    const maxEvents = 8;

    function initThree() {
      scene = new THREE.Scene();

      const width = 1;
      const height = 16 / 9;
      camera = new THREE.OrthographicCamera(-width / 2, width / 2, height / 2, -height / 2, 0.1, 10);
      camera.position.z = 1;

      const geometry = new THREE.PlaneGeometry(width, height);

      const uniforms = {
        uTime: { value: 0 },
        uColorA: { value: new THREE.Color('#ff4b3a') },
        uColorB: { value: new THREE.Color('#34a6ff') },
        uBg: { value: new THREE.Color('#111111') },
        uFooterColor: { value: new THREE.Color('#cccccc') },
        uCols: { value: 10 },
        uStripeDensity: { value: 12 },
        uFoulIntensity: { value: 0.2 },
        uCorners: { value: 0.3 },
        uAvgAcc: { value: 0.9 },
        uGoalDiff: { value: 0 },
        uPossHome: { value: 0.5 },
        uYellowCount: { value: 0 },
        uRedCount: { value: 0 },
        uOffsideCount: { value: 0 },
        uYellowPositions: { value: new Array(maxEvents).fill(0) },
        uRedOffsets: { value: new Array(maxEvents).fill(0) },
        uOffsidePositions: { value: new Array(maxEvents).fill(0) },
        uYellow: { value: new THREE.Color('#ffd93b') },
        uRed: { value: new THREE.Color('#ff1f3d') },
      };

      material = new THREE.ShaderMaterial({
        uniforms,
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          precision highp float;
          varying vec2 vUv;

          uniform float uTime;
          uniform vec3 uColorA;
          uniform vec3 uColorB;
          uniform vec3 uBg;
          uniform vec3 uFooterColor;
          uniform float uCols;
          uniform float uStripeDensity;
          uniform float uFoulIntensity;
          uniform float uCorners;
          uniform float uAvgAcc;
          uniform float uGoalDiff;
          uniform float uPossHome;

          uniform float uYellowCount;
          uniform float uRedCount;
          uniform float uOffsideCount;
          uniform float uYellowPositions[${maxEvents}];
          uniform float uRedOffsets[${maxEvents}];
          uniform float uOffsidePositions[${maxEvents}];
          uniform vec3 uYellow;
          uniform vec3 uRed;

          float hash21(vec2 p) {
            p = fract(p * vec2(233.34, 851.73));
            p += dot(p, p + 23.45);
            return fract(p.x * p.y);
          }

          void main() {
            float footerHeight = 0.2;

            if (vUv.y < footerHeight) {
              gl_FragColor = vec4(uFooterColor, 1.0);
              return;
            }

            float y = (vUv.y - footerHeight) / (1.0 - footerHeight);
            float x = vUv.x;

            // Global tilt influenced by goal difference
            x += (y - 0.5) * uGoalDiff;

            float colIndex = floor(x * uCols);
            float t = colIndex / uCols;
            vec3 baseStripe = (t < uPossHome) ? uColorA : uColorB;

            // Wavy offset
            float wave = sin(y * 8.0 + colIndex * 0.8) * uFoulIntensity * 0.25;
            float curve = sin(y * 3.1415 * 2.0 + uCorners * 2.5) * uCorners * 0.2;
            float jitter = (1.0 - uAvgAcc) * (hash21(vec2(x * 30.0, y * 40.0)) - 0.5) * 0.15;
            float offset = wave + curve + jitter;

            // Stripe mask
            float stripe = abs(fract((x + offset) * uStripeDensity) - 0.5);
            float stripeMask = smoothstep(0.35, 0.15, stripe);
            vec3 color = mix(uBg, baseStripe, stripeMask);

            // Offside gaps (erase stripes toward background)
            for (int i = 0; i < ${maxEvents}; i++) {
              if (float(i) >= uOffsideCount) break;
              float pos = uOffsidePositions[i];
              float gap = smoothstep(0.0, 0.015, abs(y - pos));
              color = mix(color, uBg, gap);
            }

            // Yellow card bands
            for (int i = 0; i < ${maxEvents}; i++) {
              if (float(i) >= uYellowCount) break;
              float pos = uYellowPositions[i];
              float band = 1.0 - smoothstep(0.0, 0.02, abs(y - pos));
              color = mix(color, uYellow, band * 0.75);
            }

            // Red card diagonals
            for (int i = 0; i < ${maxEvents}; i++) {
              if (float(i) >= uRedCount) break;
              float off = uRedOffsets[i];
              float dist = abs(y - (x + off));
              float slash = 1.0 - smoothstep(0.02, 0.06, dist);
              color = mix(color, uRed, slash);
            }

            gl_FragColor = vec4(color, 1.0);
          }
        `,
      });

      mesh = new THREE.Mesh(geometry, material);
      scene.add(mesh);

      renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      containerEl.appendChild(renderer.domElement);

      resize();
      render();
    }

    function resize() {
      const targetWidth = Math.min(window.innerWidth * 0.9, window.innerHeight * 0.9 * 9 / 16);
      const width = targetWidth;
      const height = width * 16 / 9;
      renderer.setSize(width, height, false);
    }

    window.addEventListener('resize', () => {
      resize();
      render();
    });

    // ---------- Data mapping ----------
    function statsToUniforms(data) {
      const totalShots = (data.shots?.home || 0) + (data.shots?.away || 0);
      const totalPasses = (data.passes?.home || 0) + (data.passes?.away || 0);
      const possHome = (data.possession?.home || 0) / 100;
      const totalFouls = (data.fouls?.home || 0) + (data.fouls?.away || 0);
      const totalCorners = (data.corners?.home || 0) + (data.corners?.away || 0);
      const avgAcc = (((data.passAccuracy?.home || 0) + (data.passAccuracy?.away || 0)) / 2) / 100;
      const goalDiff = (data.score?.away || 0) - (data.score?.home || 0);
      const totalYellows = (data.yellowCards?.home || 0) + (data.yellowCards?.away || 0);
      const totalReds = (data.redCards?.home || 0) + (data.redCards?.away || 0);
      const totalOffsides = (data.offsides?.home || 0) + (data.offsides?.away || 0);

      const uCols = 6 + norm(totalShots, 5, 40) * 10.0; // 6..16
      const uStripeDensity = 8.0 + norm(totalPasses, 200, 900) * 22.0; // 8..30
      const uFoulIntensity = norm(totalFouls, 0, 30); // 0..1
      const uCorners = norm(totalCorners, 0, 15); // 0..1
      const uAvgAcc = clamp(avgAcc, 0, 1);
      const uGoalDiff = clamp(goalDiff, -5, 5) * 0.05; // subtle tilt

      const footerColor = (() => {
        const home = data.score?.home ?? 0;
        const away = data.score?.away ?? 0;
        if (home > away) return '#ff4b3a';
        if (away > home) return '#34a6ff';
        return '#cccccc';
      })();

      // Compute event positions (spread through pattern area 0..1)
      const spreadPositions = (count) => {
        const arr = [];
        for (let i = 0; i < count; i++) {
          arr.push((i + 1) / (count + 1));
        }
        return arr;
      };

      const yellowPositions = spreadPositions(Math.min(totalYellows, maxEvents));
      const redOffsets = spreadPositions(Math.min(totalReds, maxEvents)).map(v => (v - 0.5) * 0.8);
      const offsidePositions = spreadPositions(Math.min(totalOffsides, maxEvents));

      return {
        uCols,
        uStripeDensity,
        uFoulIntensity,
        uCorners,
        uAvgAcc,
        uGoalDiff,
        uPossHome: clamp(possHome, 0, 1),
        uFooterColor: footerColor,
        yellowPositions,
        redOffsets,
        offsidePositions,
        counts: { totalYellows, totalReds, totalOffsides },
      };
    }

    function updateUniforms(mapped) {
      material.uniforms.uCols.value = mapped.uCols;
      material.uniforms.uStripeDensity.value = mapped.uStripeDensity;
      material.uniforms.uFoulIntensity.value = mapped.uFoulIntensity;
      material.uniforms.uCorners.value = mapped.uCorners;
      material.uniforms.uAvgAcc.value = mapped.uAvgAcc;
      material.uniforms.uGoalDiff.value = mapped.uGoalDiff;
      material.uniforms.uPossHome.value = mapped.uPossHome;
      material.uniforms.uFooterColor.value.set(mapped.uFooterColor);

      // Reset arrays to zero
      const zeros = new Array(maxEvents).fill(0);
      material.uniforms.uYellowPositions.value = zeros.slice();
      material.uniforms.uRedOffsets.value = zeros.slice();
      material.uniforms.uOffsidePositions.value = zeros.slice();

      mapped.yellowPositions.forEach((v, i) => material.uniforms.uYellowPositions.value[i] = v);
      mapped.redOffsets.forEach((v, i) => material.uniforms.uRedOffsets.value[i] = v);
      mapped.offsidePositions.forEach((v, i) => material.uniforms.uOffsidePositions.value[i] = v);

      material.uniforms.uYellowCount.value = mapped.counts.totalYellows;
      material.uniforms.uRedCount.value = mapped.counts.totalReds;
      material.uniforms.uOffsideCount.value = mapped.counts.totalOffsides;
    }

    function render() {
      renderer.render(scene, camera);
    }

    // ---------- UI interactions ----------
    function updateFooterText(data) {
      const home = data.homeTeam || 'Home';
      const away = data.awayTeam || 'Away';
      const homeScore = data.score?.home ?? 0;
      const awayScore = data.score?.away ?? 0;
      footerText.textContent = `${home} ${homeScore} – ${awayScore} ${away}`;
    }

    function generateFromJSON() {
      const input = document.getElementById('jsonInput');
      try {
        const parsed = JSON.parse(input.value);
        const mapped = statsToUniforms(parsed);
        updateUniforms(mapped);
        updateFooterText(parsed);
        render();
      } catch (err) {
        alert('Invalid JSON: ' + err.message);
      }
    }

    function downloadPNG() {
      const link = document.createElement('a');
      link.href = renderer.domElement.toDataURL('image/png');
      link.download = 'soccer-poster.png';
      link.click();
    }

    document.getElementById('generateBtn').addEventListener('click', generateFromJSON);
    document.getElementById('downloadBtn').addEventListener('click', downloadPNG);

    // ---------- Bootstrap ----------
    document.getElementById('jsonInput').value = defaultJSON;
    const initialData = JSON.parse(defaultJSON);
    initThree();
    updateUniforms(statsToUniforms(initialData));
    updateFooterText(initialData);
    render();
  </script>
</body>
</html>
